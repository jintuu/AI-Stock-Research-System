# ============================================================
#  AI Multi-Agent Stock Research System — Configuration
# ============================================================

# --- Market Selection: "us" or "india" ---
market: "us"

# --- Agent Weights (must sum to 1.0) ---
weights:
  fundamentals: 0.40
  technicals: 0.35
  sentiment: 0.25

# --- Categorisation Thresholds ---
thresholds:
  min_combined_score: 40        # minimum score to include in results

  short_term:
    technical_min: 62           # technical score floor
    sentiment_min: 0.05         # sentiment score floor
    combined_min: 55

  medium_term:
    technical_min: 45
    fundamental_min: 42
    combined_min: 52

  long_term:
    fundamental_min: 62
    combined_min: 50

# --- Stock Universe ---
stock_universe:
  # Options: sp500_top100 | sp500 | nasdaq100 | dow30 | custom
  default: "sp500_top100"
  custom_tickers: []
  max_stocks: 503                # set lower in the dashboard for speed (e.g. 50–100)

# --- Data Settings ---
data:
  price_history_days: 400        # enough for SMA-200
  cache_enabled: true
  cache_ttl_minutes: 60
  request_delay_seconds: 0.3     # politeness delay between yfinance calls

# --- Reddit (optional – leave blank to disable) ---
reddit:
  enabled: false
  client_id: ""
  client_secret: ""
  user_agent: "StockResearchBot/1.0 (by u/yourname)"
  subreddits:
    - "stocks"
    - "investing"
    - "SecurityAnalysis"
    - "wallstreetbets"
  max_posts: 150
  wsb_hype_penalty: true         # flag WSB stocks with hype-risk

# --- News ---
news:
  enabled: true
  max_articles_per_ticker: 10
  sources:
    yahoo_finance: true
    google_news: true

# --- Output ---
output:
  save_results: true
  results_dir: "data/results"
  format: "both"                 # json | csv | both

# --- India Market Settings ---
india:
  universe:
    # Options: nifty50 | nifty100 | nifty200 | nifty500 | custom
    default: "nifty50"
    custom_tickers: []
    max_stocks: 50
  benchmark: "^NIFTY"
  currency: "₹"
  reddit:
    subreddits:
      - "IndianStockMarket"
      - "DalalStreetTalks"
      - "IndiaInvestments"
  news:
    sources:
      - "https://economictimes.indiatimes.com/markets/stocks/rssfeeds/2146842.cms"
      - "https://www.moneycontrol.com/rss/MCtopnews.xml"
      - "https://www.business-standard.com/rss/markets-106.rss"

# --- Technical Indicator Parameters ---
technical:
  sma_short: 20
  sma_mid: 50
  sma_long: 200
  ema_fast: 12
  ema_slow: 26
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  atr_period: 14
  volume_ma_period: 20
